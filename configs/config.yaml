name: exp_1
description: 'FSFVE training run.'

data:
  path: 'path/to/dataset'
  crf: 44
  clusters: 30
  cluster_frames: 5000
  use_ycbcr: False
  use_dct: True
  scale: True
  use_blur:
    type: gaussian        # gaussian, box, median, unsharp
    kernel_size: 3        # e.g. 3, 5, 7, 9, 11
    sigma: 0.8            # e.g. 0.8, 1.1, 1.4, 1.7, 2.0
  augmentation: ''        # hflip, affine, or ''
  augment_mul: 0
  valid_size: 100         # frames per cluster for validation; -1 means all

model:
  kwargs:
    in_features: 192
    out_features: 192
    hidden_features: 512
    hidden_layers: 3
    outermost_linear: True
    first_omega_0: 50
    hidden_omega_0: 50
    dropout: 0
    norm: ''
  reg_mul: 0
  kernel_size: 8
  stride: 2         # overlapping blocks during training for more patches; stride=8 (non-overlapping) is used at inference

train:
  device: cpu             # cpu or cuda
  learning_rate: 0.0001
  ema: 0.95               # exponential moving average decay; 0 to disable
  scheduler: [70, 90]
  gamma: 0.1
  batch_size: -1          # -1 means full batch
  epoch_start: 0
  epochs: 100
